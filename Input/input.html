<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your To Do List.</title>
    <link rel="stylesheet" href="../Style/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <div class="banner">
        <h1>Think bigger and just do it!</h1>
      </div>
    </header>
    <main>
      <div class="container">
        <h1>To Do List.</h1>

        <div class="input-area">
          <form>
            <input type="text" id="taskInput" placeholder="Aggiungi task..." />
          </form>
          <button onclick="addTask()">+</button>
        </div>

        <ul id="taskList"></ul>
      </div>
    </main>
    <footer class="banner"></footer>
    <script src="../Scripts/script.JS"></script>
  </body>
</html>
